<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Mint rounded background -->
  <rect width="100" height="100" rx="22" fill="#B2DFDB"/>

  <!-- Pilates figure: "The Teaser" pose — V-sit, legs + arms extended -->

  <!-- Head -->
  <circle cx="50" cy="18" r="9" fill="#26A69A"/>

  <!-- Spine / torso curving back -->
  <path d="M50 27 Q44 42 38 55" stroke="#26A69A" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left arm reaching toward toes -->
  <path d="M46 36 L22 52" stroke="#26A69A" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Right arm reaching toward toes -->
  <path d="M46 36 L70 28" stroke="#26A69A" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Left leg raised (V shape) -->
  <path d="M38 55 L18 38" stroke="#26A69A" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Right leg raised (V shape) -->
  <path d="M38 55 L72 46" stroke="#26A69A" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Small feet indicators -->
  <circle cx="16" cy="36" r="4" fill="#26A69A"/>
  <circle cx="75" cy="44" r="4" fill="#26A69A"/>
</svg>
